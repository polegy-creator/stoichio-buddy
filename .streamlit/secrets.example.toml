# Copy one storage option into Streamlit Community Cloud -> App settings -> Secrets.
# Do not commit a real .streamlit/secrets.toml file.

# Option A: Google Apps Script. This avoids Google Cloud service accounts.
apps_script_url = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec"
apps_script_token = "make-a-long-random-password-here"

# Option B: Google Cloud service account.
google_sheet_id = "paste-your-google-sheet-id-here"
google_sheet_name = "Stoichio Buddy Data"

[gcp_service_account]
type = "service_account"
project_id = "your-google-cloud-project-id"
private_key_id = "your-private-key-id"
private_key = """-----BEGIN PRIVATE KEY-----
paste-private-key-here
-----END PRIVATE KEY-----"""
client_email = "your-service-account@your-project.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-service-account%40your-project.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
